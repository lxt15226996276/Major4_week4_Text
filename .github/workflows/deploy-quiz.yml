name: Deploy Quiz Site

on:
  push:
    branches: [main, master]
    paths:
      - "QuizSite/**"
      - "Tests/**"
      - ".github/workflows/deploy-quiz.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-quiz-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install openpyxl

      - name: Build static site
        run: python QuizSite/scripts/prepare_static.py

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: QuizSite/dist
          branch: gh-pages
          commit-message: Deploy quiz site (CI)
